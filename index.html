<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关注公众号</title>
<style>
  body {
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    background: #f7f7f7;
    text-align: center;
  }
  .btn {
    background: #07C160;
    color: white;
    border: none;
    padding: 15px 40px;
    border-radius: 30px;
    font-size: 18px;
    margin: 12px;
    text-decoration: none;
    display: inline-block;
    cursor: pointer;
  }
  .tip {
    font-size: 14px;
    color: #999;
    margin: 20px 20px 0 20px;
    line-height: 1.6;
  }
</style>
</head>
<body>
<h2>关注公众号</h2>
<p>点击下方按钮，快速前往微信关注</p>
<a class="btn" id="openBtn" href="#">打开微信关注</a>
<p class="tip" id="tip">若无法自动跳转，请根据提示操作</p>

<script>
  var gzhLink = "https://mp.weixin.qq.com/mp/profile_ext?action=home&__biz=MzY0MDE5NzQyMQ==&scene=124#wechat_redirect";

  function isWechat() {
    return /MicroMessenger/i.test(navigator.userAgent);
  }
  function isIOS() {
    return /iPhone|iPad|iPod/i.test(navigator.userAgent);
  }

  document.getElementById('openBtn').addEventListener('click', function(e) {
    e.preventDefault();

    // 微信内直接跳转
    if (isWechat()) {
      window.location.href = gzhLink;
      return;
    }

    // 安卓：直接打开微信并加载公众号主页
    if (!isIOS()) {
      // 将链接中的 # 编码为 %23，避免 intent 截断
      var intentUrl = "intent://mp.weixin.qq.com/mp/profile_ext?action=home&__biz=MzY0MDE5NzQyMQ==&scene=124%23wechat_redirect#Intent;scheme=weixin;package=com.tencent.mm;end;";
      window.location.href = intentUrl;
      document.getElementById('tip').innerText = '正在打开微信...';
      return;
    }

    // iOS：唤起微信，同时把链接复制到剪贴板，利用微信顶部横幅
    window.location.href = 'weixin://';
    if (navigator.clipboard) {
      navigator.clipboard.writeText(gzhLink).then(function() {
        document.getElementById('tip').innerHTML = '✅ 链接已复制<br>微信顶部点击“已复制链接”即可打开';
      }).catch(function() {
        document.getElementById('tip').innerText = '请手动复制此链接在微信中打开： ' + gzhLink;
      });
    } else {
      document.getElementById('tip').innerText = '请手动复制此链接在微信中打开： ' + gzhLink;
    }
  });
</script>
</body>
</html>
